repos:
  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  # JS/JSX/CSS formatting
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx --prefix frontend prettier --write
        language: system
        files: ^frontend/.*\.(js|jsx|css|json)$
        types_or: [javascript, jsx, css, json]

  # ESLint
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx --prefix frontend eslint --config frontend/eslint.config.js
        language: system
        files: ^frontend/.*\.(js|jsx)$
        types: [file]
